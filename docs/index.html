<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Trends — Japan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-top">
      <h1>X Trends — Japan</h1>
      <input type="date" id="date-picker">
    </div>
    <nav id="tab-nav">
      <button class="tab-btn active" data-tab="trends">トレンド</button>
    </nav>
    <p id="fetched-at"></p>
  </header>

  <main>
    <div id="trends-list">
      <p class="loading">読み込み中...</p>
    </div>
    <div id="posts-list" hidden></div>
  </main>

  <footer>
    <p>Data from X API · <a href="https://developer.x.com/">developer.x.com</a></p>
    <p>詳細は Google 検索で確認（X へのリンクは意図的に張っていません）</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
