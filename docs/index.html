<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Trends — Japan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-top">
      <h1>X Trends — Japan</h1>
      <div class="header-controls">
        <input type="date" id="date-picker">
        <div class="settings-wrap">
          <button class="settings-btn" id="btn-settings" aria-expanded="false" aria-label="設定">⚙️</button>
          <div class="settings-panel" id="settings-panel" hidden>
            <label class="settings-row">
              <span class="settings-label">
                X への直リンクを表示する
                <small>個別ポストへのリンクです。タイムラインは開きません。</small>
              </span>
              <input type="checkbox" id="toggle-x-links">
            </label>
          </div>
        </div>
      </div>
    </div>
    <div class="date-nav">
      <button class="date-nav-btn" id="btn-prev">← 前日</button>
      <span id="current-date-label">今日</span>
      <button class="date-nav-btn" id="btn-next" disabled>翌日 →</button>
    </div>
    <nav id="tab-nav">
      <button class="tab-btn" data-tab="trends" data-tab-type="trends">トレンド</button>
    </nav>
    <p id="fetched-at"></p>
  </header>

  <main>
    <div id="trends-list"></div>
    <div id="posts-list" hidden></div>
  </main>

  <footer>
    <p>Data from X API · <a href="https://developer.x.com/">developer.x.com</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
